name: Publish

# On each published GitHub Release (or manual dispatch):
#   1. build + upload the package to PyPI  (Trusted Publishing, OIDC)
#   2. publish server.json to the official MCP Registry  (GitHub OIDC)
# No API tokens or secrets required — both steps authenticate via OIDC.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # safe to re-run for an already-published version

  registry:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for MCP Registry GitHub OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
